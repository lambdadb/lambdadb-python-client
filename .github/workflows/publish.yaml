# Publish to PyPI using Trusted Publishing (OIDC).
# Configure the trusted publisher on PyPI: https://pypi.org/manage/project/lambdadb/settings/publishing/
# Set Workflow name to: publish.yaml
# See: https://docs.github.com/en/actions/security-for-github-actions/security-hardening-your-deployments/configuring-openid-connect-in-pypi

name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate release tag and package version
        if: github.event_name == 'release'
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_IS_PRERELEASE: ${{ github.event.release.prerelease }}
        run: |
          python - <<'PY'
          import os
          import re
          import sys
          import tomllib
          from packaging.version import Version

          tag = os.environ["RELEASE_TAG"]
          release_is_prerelease = os.environ["RELEASE_IS_PRERELEASE"].lower() == "true"
          match = re.fullmatch(r"v(?P<version>.+)", tag)
          if not match:
              raise SystemExit(f"Release tag must look like v<version>, got: {tag}")

          tag_version_text = match.group("version")
          tag_version = Version(tag_version_text)

          with open("pyproject.toml", "rb") as f:
              data = tomllib.load(f)
          package_version_text = data["project"]["version"]
          package_version = Version(package_version_text)

          if tag_version != package_version:
              raise SystemExit(
                  f"Tag version ({tag_version}) != pyproject version ({package_version})"
              )

          if tag_version.is_prerelease != release_is_prerelease:
              raise SystemExit(
                  "GitHub release prerelease flag does not match version type. "
                  f"version={tag_version} prerelease={tag_version.is_prerelease}, "
                  f"release.prerelease={release_is_prerelease}"
              )

          print(f"Validated release tag/version: {tag} -> {package_version}")
          PY

      - name: Install build
        run: python -m pip install --upgrade pip build packaging

      - name: Build distributions
        run: python -m build

      - name: Upload dists
        uses: actions/upload-artifact@v4
        with:
          name: release-dists
          path: dist/

  pypi-publish:
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      id-token: write
    steps:
      - name: Download release distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
